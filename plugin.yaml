name: hermes-loop
version: 1.0.1
description: Continuous task execution loop plugin that keeps the agent running until goals are completed via state file monitoring and optional completion promises
author: Ash Martian
license: MIT
provides_tools:
  - loop_status
  - set_completion_promise
  - init_loop
  - complete_task
  - add_blocking_issue
  - reset_loop
provides_hooks:
  - post_tool_call
  - on_session_start
  - pre_llm_call
  - on_session_end
