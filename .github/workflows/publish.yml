name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel
          
      - name: Build package (from current checkout)
        run: |
          python -m build
          
      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          
  publish-to-pypi:
    needs: build-and-publish
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-loop-plugin
      
    permissions:
      id-token: write
      
    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        
  test-installation:
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install from PyPI
        run: |
          pip install hermes-loop-plugin --force-reinstall
          
      - name: Verify installation
        run: |
          python -c "import hermes_loop_plugin; print('hermes-loop-plugin installed successfully')"
