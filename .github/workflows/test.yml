     9|jobs:
    10|  build-and-test:
    11|    runs-on: ubuntu-latest
    12|    
    13|    strategy:
    14|      matrix:
    15|        python-version: ['3.8', '3.9', '3.10', '3.11']
    16|    
    17|    steps:
    18|      - name: Checkout code
    19|        uses: actions/checkout@v4
    20|        
    21|      - name: Set up Python ${{ matrix.python-version }}
    22|        uses: actions/setup-python@v5
    23|        with:
    24|          python-version: ${{ matrix.python-version }}
    25|          
    26|      - name: Install build dependencies
    27|        run: |
    28|          python -m pip install --upgrade pip
    29|          pip install build virtualenv
    30|      
    31|      - name: Build package
    32|        run: |
    33|          python -m build
    34|          ls -la dist/
    35|      
    36|- name: Create and test virtual environment
    37|        run: |
    38|          cd /tmp
    39|          rm -rf test-venv-${{ matrix.python-version }}
    40|          python3 -m venv test-venv-${{ matrix.python-version }}
    41|          source test-venv-${{ matrix.python-version }}/bin/activate
    42|          pip install --upgrade pip >/dev/null 2>&1
    43|          pip install ../hermes-loop-plugin/dist/*.whl
    44|          echo "Installed packages:"
    45|          pip list
    46|
    47|      - name: Verify package metadata and tools
    48|        run: |
    49|          cd /tmp/test-venv-${{ matrix.python-version }}
    50|          source bin/activate
    51|          python3 << 'PYTHON_SCRIPT'
    52|import hermes_loop_plugin
    53|print('Module imported successfully')
    54|
    55|# Verify all tools are registered in the module
    56|with open('/home/runner/work/hermes-loop-plugin/hermes-loop-plugin/hermes_loop_plugin/__init__.py') as f:
    57|    content = f.read()
    58|    
    59|expected_tools = ['init_loop', 'loop_status', 'complete_task', 
    60|                  'add_blocking_issue', 'reset_loop', 'set_completion_promise']
    61|
    62|missing = []
    63|for tool in expected_tools:
    64|    if f'name="{tool}"' not in content and f"name='{tool}'" not in content:
    65|        missing.append(tool)
    66|
    67|if missing:
